services:
  prover:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: darkwallet-prover
    restart: unless-stopped
    env_file:
      - services/prover/.env.example
    environment:
      MIDLIGHT_REDIS_URL: redis://redis:6379
      MIDLIGHT_DATABASE_URL: postgres://darkwallet:${POSTGRES_PASSWORD:-darkwallet}@postgres:5432/darkwallet
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    expose:
      - "4000"

  redis:
    image: redis:7.4-alpine
    container_name: darkwallet-redis-prod
    command: ["redis-server", "--save", "60", "1", "--requirepass", "${REDIS_PASSWORD:-darkwallet}"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-darkwallet}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - darkwallet-redis-data:/data

  postgres:
    image: postgres:16-alpine
    container_name: darkwallet-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: darkwallet
      POSTGRES_USER: darkwallet
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-darkwallet}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U darkwallet -d darkwallet"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - darkwallet-postgres-data:/var/lib/postgresql/data

  nginx:
    image: nginx:alpine
    container_name: darkwallet-nginx
    restart: unless-stopped
    command:
      - /bin/sh
      - -c
      - |
        envsubst '$$SSL_CERT_BASE $$SSL_DOMAIN' < /etc/nginx/templates/nginx.conf.template > /etc/nginx/nginx.conf
        exec nginx -g 'daemon off;'
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - prover
    environment:
      SSL_CERT_BASE: ${SSL_CERT_BASE:-/etc/letsencrypt/live}
      SSL_DOMAIN: ${SSL_DOMAIN:-localhost}
    volumes:
      - ./nginx.conf:/etc/nginx/templates/nginx.conf.template:ro
      - ./dist:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

volumes:
  darkwallet-redis-data:
  darkwallet-postgres-data:
