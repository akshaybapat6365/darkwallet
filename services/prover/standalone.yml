services:
  redis:
    image: redis:7.4-alpine
    container_name: 'darkwallet-redis'
    ports:
      - '6379:6379'
    command: ['redis-server', '--save', '60', '1', '--loglevel', 'warning']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    container_name: 'darkwallet-postgres'
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: darkwallet
      POSTGRES_USER: darkwallet
      POSTGRES_PASSWORD: darkwallet
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U darkwallet -d darkwallet']
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - darkwallet-postgres-data:/var/lib/postgresql/data

  proof-server:
    container_name: 'darkwallet-proof-server'
    image: 'midnightntwrk/proof-server:7.0.0'
    command: ['midnight-proof-server', '-v']
    ports:
      - '6300:6300'
    environment:
      RUST_BACKTRACE: 'full'
      # Proof generation can take a long time on laptops. Default job-timeout is 600s.
      MIDNIGHT_PROOF_SERVER_JOB_TIMEOUT: '7200'
      MIDNIGHT_PROOF_SERVER_NUM_WORKERS: '4'

  indexer:
    container_name: 'darkwallet-indexer'
    image: 'midnightntwrk/indexer-standalone:3.0.0'
    env_file: standalone.env.example
    ports:
      - '8088:8088'
    environment:
      RUST_LOG: 'indexer=info,chain_indexer=info,indexer_api=info,wallet_indexer=info,indexer_common=info,fastrace_opentelemetry=off,info'
      APP__APPLICATION__NETWORK_ID: 'undeployed'
    healthcheck:
      test: ['CMD-SHELL', 'cat /var/run/indexer-standalone/running']
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s
    depends_on:
      node:
        condition: service_healthy

  node:
    image: 'midnightntwrk/midnight-node:0.20.0'
    container_name: 'darkwallet-node'
    ports:
      - '9944:9944'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9944/health']
      interval: 2s
      timeout: 5s
      retries: 20
      start_period: 20s
    environment:
      CFG_PRESET: 'dev'
      SIDECHAIN_BLOCK_BENEFICIARY: '04bcf7ad3be7a5c790460be82a713af570f22e0f801f6659ab8e84a52be6969e'

volumes:
  darkwallet-postgres-data:
